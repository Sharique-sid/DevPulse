server.port=${PORT:8080}
# Cloud SQL Configuration
spring.datasource.url=jdbc:mysql:///devpulse?cloudSqlInstance=plucky-order-495106-f6:us-central1:devpulse-db&socketFactory=com.google.cloud.sql.mysql.SocketFactory
spring.datasource.username=${DB_USER:devpulse-user}
spring.datasource.password=${DB_PASSWORD}

# Use the Cloud SQL Connector
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Security
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000
app.ai.gemini.api-key=${GEMINI_API_KEY}

